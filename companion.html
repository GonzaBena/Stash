<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stash Companion</title>
  <link rel="stylesheet" href="companion.css" />
</head>
<body>
  <div id="companion-root">
    <div id="companion-search-wrap">
      <svg id="companion-icon" width="17" height="17" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        id="companion-input"
        type="text"
        placeholder="Search prompts…"
        autocomplete="off"
        spellcheck="false"
      />
      <kbd id="companion-esc-hint">esc</kbd>
    </div>
    <div id="companion-list"></div>
    <div id="companion-empty" hidden>No prompts match</div>
  </div>
  <script src="companion.js"></script>
</body>
</html>
