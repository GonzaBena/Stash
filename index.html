<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stash — your prompt library</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #f2a23b; --accent-soft: #fef3e0;
      --bg: #faf7f2; --bg-soft: #fbf8f1; --surface: #ffffff;
      --text: #1a1612; --text-2: #3a342a; --text-3: #5a544a;
      --text-muted: #6b6358; --text-muted-2: #8a8273; --text-faint: #a8a092;
      --border: #ebe5d8; --border-strong: #e5dfd0; --border-soft: #f3eee0;
      --shadow-rgb: 26,22,18;
      --row-hover: rgba(0,0,0,.025);
      --row-hover-2: rgba(0,0,0,.05);
      --row-selected: rgba(0,0,0,.025);
      --scrollbar: rgba(26,22,18,.12);
      --scrollbar-hover: rgba(26,22,18,.22);
      --toast-bg: #1a1612; --toast-fg: #ffffff;
      --danger: #9a3a3a;
    }
    :root.dark {
      --bg: #15130f; --bg-soft: #1c1a16; --surface: #25221d;
      --text: #f4efe3; --text-2: #d8d0bf; --text-3: #bcb3a0;
      --text-muted: #9a907e; --text-muted-2: #807665; --text-faint: #6b6358;
      --border: #2e2a23; --border-strong: #3a342a; --border-soft: #221f1a;
      --shadow-rgb: 0,0,0;
      --row-hover: rgba(255,255,255,.035);
      --row-hover-2: rgba(255,255,255,.06);
      --row-selected: rgba(255,255,255,.04);
      --scrollbar: rgba(244,239,227,.14);
      --scrollbar-hover: rgba(244,239,227,.28);
      --toast-bg: #f4efe3; --toast-fg: #1a1612;
      --danger: #e88b8b;
    }
    html, body, #root { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: "Geist", system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      transition: background-color .2s, color .2s;
    }
    button { font-family: inherit; }
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
    *::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); border: 2px solid transparent; background-clip: content-box; }

    /* ── Splash screen ─────────────────────────────────────────────────────── */
    @keyframes splashLogoIn {
      from { opacity: 0; transform: scale(0.88) translateY(6px); }
      to   { opacity: 1; transform: scale(1)   translateY(0);    }
    }
    @keyframes splashTextIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
    @keyframes splashDot {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.7); }
      40%            { opacity: 1;    transform: scale(1);   }
    }
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: #15130f;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #splash.splash-hide { opacity: 0; visibility: hidden; pointer-events: none; }
    #splash-logo {
      width: 72px; height: 72px; border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.06);
      animation: splashLogoIn 0.45s cubic-bezier(.2,.8,.3,1) both;
    }
    #splash-name {
      font-family: "Geist", system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 22px; font-weight: 600; letter-spacing: -0.4px;
      color: #f4efe3;
      animation: splashTextIn 0.4s cubic-bezier(.2,.8,.3,1) 0.1s both;
    }
    #splash-dots {
      display: flex; gap: 5px;
      animation: splashTextIn 0.4s cubic-bezier(.2,.8,.3,1) 0.18s both;
    }
    #splash-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: #f2a23b; display: block;
      animation: splashDot 1.2s ease-in-out infinite;
    }
    #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    #splash-dots span:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body>
  <!-- Splash: se muestra antes de que React cargue, elimina la pantalla blanca -->
  <div id="splash" aria-hidden="true">
    <img id="splash-logo" src="/logo.png" alt="" />
    <span id="splash-name">Stash</span>
    <div id="splash-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
