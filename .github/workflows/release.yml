name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Compilar en cada plataforma ─────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
            artifact: dist/*.exe

          - os: macos-latest
            script: build:mac
            artifact: dist/*.dmg

          - os: ubuntu-latest
            script: build:linux
            artifact: dist/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # macOS: electron-builder necesita las herramientas de línea de comandos de Xcode
      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: xcode-select --install || true

      - name: Build
        run: pnpm run ${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # ── Crear la release y adjuntar todos los binarios ─────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para crear releases y subir assets

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true   # aplana todos los artifact-* en una sola carpeta

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Stash ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
